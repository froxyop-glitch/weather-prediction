<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merged Weather Planner</title>
    <script>
        // 1. Gather all inputs at the top
        var temp = prompt("Enter the temperature outside (in Fahrenheit):");
        var sky = prompt("What is it like outside? (Enter: sun, rain, or snow)").toLowerCase().trim();

        // 2. Temperature Logic Function
        function checkTemperature(temp) {
            // Convert input to a number to safely compare
            var numericTemp = Number(temp); 

            if (numericTemp >= 100) {
                document.write("<p><strong>Temp Advice:</strong> It is scorching. Shorts and a t-shirt, or maybe just stay by the AC.</p>");
            } else if (numericTemp >= 60) {
                document.write("<p><strong>Temp Advice:</strong> Perfect weather! Shorts and a t-shirt will do nicely.</p>");
            } else if (numericTemp >= 40) {
                document.write("<p><strong>Temp Advice:</strong> Getting a bit nippy. Grab some pants and a light jacket.</p>");
            } else if (numericTemp >= 0) {
                document.write("<p><strong>Temp Advice:</strong> It is freezing. Bundle up with a heavy coat and a sweater!</p>");
            } else if (numericTemp <= -1) {
                document.write("<p><strong>Temp Advice:</strong> Stay inside! There is no reason to risk frostbite.</p>");
            } else {
                document.write("<p><strong>Temp Advice:</strong> That temperature doesn't look right. Please refresh and try again.</p>");
            }
        }

        // 3. Sky Condition Logic Function
        function checkSky(skyCondition) {
            // Use '===' for comparison and quotes around strings
            if (skyCondition === "sun") {
                document.write("<p><strong>Sky Advice:</strong> Enjoy the sunshine! Get outside, unless it's too hot or cold.</p>");
            } else if (skyCondition === "rain") {
                document.write("<p><strong>Sky Advice:</strong> Grab an umbrella and a rain jacket so you don't get soaked.</p>");
            } else if (skyCondition === "snow") {
                document.write("<p><strong>Sky Advice:</strong> Beautiful snow! Wear waterproof boots and bundle up.</p>");
            } else {
                document.write("<p><strong>Sky Advice:</strong> Unknown condition. Make sure to type 'sun', 'rain', or 'snow'.</p>");
            }
        }

        // 4. Run both checks sequentially
        document.write("<h2>Your Local Weather Report:</h2>");
        checkTemperature(temp);
        checkSky(sky);
    </script>
</head>
<body>
</body>
</html>
